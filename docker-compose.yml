services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://app:apppass@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:8000 project.wsgi:application"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
